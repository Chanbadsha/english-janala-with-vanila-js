<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title And Tab Icon -->
    <title>English Janala</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Daisy Ui And Tailwind Css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Link Css -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="bg-[#edf7ff] px-16 lg:px-32 py-7">
      <nav
        class="flex justify-between flex-col items-center md:flex-row gap-3"
        aria-label="Main Navigation"
      >
        <a href="/" class="flex items-center text-2xl md:text-3xl">
          <span class="font-poppins">English</span>
          <img src="./assets/logo.png" alt="English Janala Logo" />
          <span class="font-hind-siliguri">জানালা</span>
        </a>
        <ul
          class="flex justify-center items-center gap-3 md:gap-6 font-poppins"
        >
          <li class="btn border border-[#5744da] text-[#5744da]">
            <a href="/faq" class="text-xs md:text-base">
              <i class="fa-solid fa-circle-question"></i>
              <span class="uppercase">Faq</span>
            </a>
          </li>
          <li class="btn border border-[#5744da] text-[#5744da]">
            <a href="/learn" class="text-xs md:text-base">
              <i class="fa-solid fa-book-open"></i>
              <span class="uppercase">Learn</span></a
            >
          </li>
          <li class="btn border border-[#5744da] text-[#5744da]">
            <a href="/logout" class="text-xs md:text-base">
              <i class="fa-solid fa-right-from-bracket"></i>
              <span class="uppercase">Logout</span></a
            >
          </li>
        </ul>
      </nav>
    </header>

    <!-- Javascript Link -->
    <script src="./scripts/script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title And Tab Icon -->
    <title>English Janala</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Google Font Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Daisy Ui And Tailwind Css -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Link Css -->
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <!-- Header Section -->
    <header class="bg-[#edf7ff] px-16 xl:px-32 py-7">
      <nav
        class="flex justify-between flex-col items-center md:flex-row gap-3"
        aria-label="Main Navigation"
      >
        <a href="/" class="flex items-center text-2xl md:text-3xl">
          <span class="">English</span>
          <img src="./assets/logo.png" alt="English Janala Logo" />
          <span class="font-bangla">জানালা</span>
        </a>
        <ul class="flex justify-center items-center gap-3 md:gap-6">
          <li class="btn border border-[#5744da] text-[#5744da]">
            <a href="/faq" class="text-xs md:text-base">
              <i class="fa-solid fa-circle-question"></i>
              <span class="uppercase">Faq</span>
            </a>
          </li>
          <li class="btn border border-[#5744da] text-[#5744da]">
            <a href="/learn" class="text-xs md:text-base">
              <i class="fa-solid fa-book-open"></i>
              <span class="uppercase">Learn</span></a
            >
          </li>
          <li class="btn border border-[#5744da] text-[#5744da]">
            <a href="/logout" class="text-xs md:text-base">
              <i class="fa-solid fa-right-from-bracket"></i>
              <span class="uppercase">Logout</span></a
            >
          </li>
        </ul>
      </nav>
    </header>

    <!-- Main Content -->
    <main class="px-3 md:px-6 lg:px-16 xl:px-32">
      <!-- Hero Section -->
      <section class="flex flex-col lg:flex-row justify-between">
        <div class="hero-content flex flex-col items-start">
          <h1 class="text-2xl lg:text-4xl x:text-5xl font-bold">
            <span class="text-[#00BCFF]">English</span> is Easy!!
          </h1>
          <p
            class="w-full font-bangla lg:max-w-3xl font-medium text-base lg:text-xl xl:text-2xl"
          >
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
            অন্য একটি Level এ
          </p>
          <form
            action=""
            class="flex flex-col items-start gap-2 w-full max-w-sm"
          >
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Enter Your Name"
              required
              class="rounded p-2 border-gray-300 w-full"
            />
            <input
              type="email"
              name="email"
              id="email"
              placeholder="Enter Your Email"
              required
              class="rounded p-2 border-gray-300 w-full"
            />
            <button type="submit" class="btn-primary btn">Get Started</button>
          </form>
        </div>
        <div class="hero-img">
          <img
            src="./assets/hero-student.png"
            alt="Hero Section Img"
            class="md:max-w-8/12 lg:max-w-full mx-auto"
          />
        </div>
      </section>

      <!-- Lessons Section -->
      <section class="mt-6 lg:mt-12 xl:mt-16 pb-12">
        <div
          class="lesson-heading-section flex items-center flex-col justify-center gap-4"
        >
          <h2
            class="text-[#00BCFF] font-bold text-2xl md:text-3xl lg:text-4xl xl:text-5xl"
          >
            Let's Learn Vocabularies
          </h2>
          <div
            id="lesson-buttons"
            class="lesson-buttons flex gap-4 flex-wrap justify-center"
          ></div>
        </div>
        <div
          id="lesson_card_container"
          class="lesson-card-section flex flex-wrap gap-4 justify-center items-center h-auto mt-6 rounded-2xl py-10 lg:py-20 text-center bg-[#f8f8f8]"
        ></div>
      </section>
    </main>

    <!-- Javascript Link -->
    <script src="./scripts/script.js"></script>
  </body>
</html>
